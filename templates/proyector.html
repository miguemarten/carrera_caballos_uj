<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏇 Desafío: Galope con Propósito — Proyector</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* ──────────────────────────────────────────
       ⚙️  VARIABLES GLOBALES
       ────────────────────────────────────────── */
        :root {
            --bg-dark: #0a0a1a;
            --bg-lane-even: #0f1128;
            --bg-lane-odd: #12152f;
            --track-bg: #1a1d3a;
            --finish-gold: #ffe66d;
            --accent-cyan: #00fff5;
            --accent-magenta: #ff2975;
            --accent-green: #7fff00;
            --text-main: #e0e0ff;
            --text-dim: #6666aa;
            --font-pixel: 'Press Start 2P', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-pixel);
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── BARRA SUPERIOR ── */
        .top-bar {
            background: linear-gradient(90deg, #0f0e17, #1a1932, #0f0e17);
            border-bottom: 3px solid var(--accent-cyan);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 4px 30px #00fff520;
            position: relative;
            z-index: 10;
        }

        .top-bar h1 {
            font-size: 13px;
            color: var(--accent-cyan);
            text-shadow: 0 0 15px #00fff5aa;
            letter-spacing: 2px;
        }

        .top-bar .meta-info {
            font-size: 8px;
            color: var(--finish-gold);
            text-shadow: 0 0 8px #ffe66d80;
        }

        /* ── CONTENEDOR DE PISTA ── */
        .race-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px 0;
            overflow-y: auto;
            position: relative;
        }

        /* ── CARRIL INDIVIDUAL ── */
        .lane {
            flex: 1;
            display: flex;
            align-items: center;
            min-height: 40px;
            max-height: 90px;
            padding: 2px 0;
            position: relative;
            border-bottom: 1px solid #1a1d4a;
            transition: flex 0.3s ease;
        }

        .lane:nth-child(odd) {
            background: var(--bg-lane-odd);
        }

        .lane:nth-child(even) {
            background: var(--bg-lane-even);
        }

        .lane:hover {
            background: #181c40;
        }

        /* Nombre del participante (izquierda) */
        .lane-label {
            width: 140px;
            padding: 0 10px;
            font-size: 7px;
            color: var(--text-main);
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
            z-index: 2;
            text-shadow: 0 0 6px #00000080;
            line-height: 1.4;
        }

        .lane-score {
            font-size: 6px;
            color: var(--text-dim);
            display: block;
            margin-top: 2px;
        }

        /* Pista (track) */
        .lane-track {
            flex: 1;
            height: 100%;
            position: relative;
            margin: 0 6px;
            background:
                repeating-linear-gradient(90deg, transparent, transparent 48px, #ffffff08 48px, #ffffff08 50px);
            border-radius: 4px;
            overflow: visible;
        }

        /* Barra de progreso interior */
        .lane-progress {
            position: absolute;
            top: 15%;
            bottom: 15%;
            left: 0;
            border-radius: 3px;
            transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            min-width: 36px;
        }

        .lane-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #ffffff25 0%, transparent 50%, #00000020 100%);
            border-radius: 3px;
        }

        /* Avatar / Caballo */
        .horse {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 3;
            position: relative;
            /* Animación de galope */
            animation: gallop 0.4s steps(2) infinite;
        }

        .horse img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid #fff;
            box-shadow: 0 0 10px #00000080;
        }

        @keyframes gallop {
            0% {
                transform: translateY(-1px);
            }

            50% {
                transform: translateY(1px);
            }
        }

        /* ── LÍNEA DE META (POR CARRIL - OPTIMIZADA) ── */
        .lane-finish {
            position: absolute;
            left: 90%;
            top: -6px;
            bottom: -6px; /* Se entrelaza perfectamente con los demás carriles */
            width: 14px;
            z-index: 2; /* Debajo del caballo */
            background: #ffffff; /* Línea continua blanca y minimalista */
            opacity: 0.9;
            transform: translateX(-50%);
            box-shadow: 
                0 0 15px rgba(255, 230, 109, 0.8),
                0 0 30px rgba(255, 230, 109, 0.4); /* Fuerte resplandor neón dorado */
        }

        .finish-flag {
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            z-index: 20;
            filter: drop-shadow(0 0 8px rgba(255, 230, 109, 0.8));
        }

        /* ── LÍNEA INTERMEDIA ── */
        .lane-halfway {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            z-index: 10;
            background: repeating-linear-gradient(180deg, var(--accent-cyan) 0px, var(--accent-cyan) 6px, transparent 6px, transparent 12px);
            opacity: 0.5;
            transform: translateX(-50%);
        }

        .halfway-label {
            position: absolute;
            top: 6px;
            left: 8px; /* Texto desplazado a la derecha de la línea */
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 7px;
            color: var(--accent-cyan);
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 8px var(--accent-cyan);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* ── LÍNEA DE RETIRO (7 PTS) ── */
        .lane-retreat {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            z-index: 10;
            background: repeating-linear-gradient(180deg, var(--accent-magenta) 0px, var(--accent-magenta) 6px, transparent 6px, transparent 12px);
            opacity: 0.5;
            transform: translateX(-50%);
        }

        .retreat-label {
            position: absolute;
            top: 6px;
            left: 8px; /* Texto desplazado a la derecha de la línea */
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 7px;
            color: var(--accent-magenta);
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 0 8px var(--accent-magenta);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* ── ESTRELLA DE HABILITADO ── */
        .star-badge {
            display: inline-block;
            margin-left: 2px;
            font-size: 8px;
            color: var(--finish-gold);
            text-shadow: 0 0 5px #ffaa00;
            vertical-align: middle;
        }

        /* ── INSIGNIA DE DESCUENTO ── */
        .discount-badge {
            display: inline-block;
            margin-left: 2px;
            font-size: 8px;
            color: var(--accent-cyan);
            text-shadow: 0 0 5px #00fff5;
            vertical-align: middle;
        }

        /* ── OVERLAY GANADOR ── */
        .winner-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000000cc;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fade-in 0.5s ease;
        }

        .winner-overlay.active {
            display: flex;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .winner-text {
            font-size: 28px;
            color: var(--finish-gold);
            text-shadow: 0 0 30px #ffe66d, 0 0 60px #ff6600;
            animation: winner-pulse 0.5s infinite alternate, winner-blink 0.3s steps(1) infinite;
            text-align: center;
            line-height: 1.6;
        }

        @keyframes winner-pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.08);
            }
        }

        @keyframes winner-blink {
            0% {
                opacity: 1;
            }

            70% {
                opacity: 1;
            }

            71% {
                opacity: 0;
            }

            100% {
                opacity: 0;
            }
        }

        .winner-name {
            font-size: 20px;
            color: var(--accent-cyan);
            text-shadow: 0 0 25px #00fff5;
            margin-top: 16px;
            animation: winner-pulse 0.6s infinite alternate;
        }

        .winner-close {
            margin-top: 30px;
            font-family: var(--font-pixel);
            font-size: 9px;
            padding: 12px 24px;
            background: transparent;
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            border-radius: 6px;
            cursor: pointer;
        }

        .winner-close:hover {
            background: #00fff520;
        }

        /* ── CONFETTI 8-BIT ── */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 99;
            overflow: hidden;
        }

        .confetti-pixel {
            position: absolute;
            width: 8px;
            height: 8px;
            image-rendering: pixelated;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0.3;
            }
        }

        /* ── PISTA VACÍA ── */
        .empty-race {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .empty-race .big-horse {
            font-size: 64px;
            animation: gallop 0.5s steps(2) infinite;
        }

        .empty-race p {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            line-height: 2;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .lane-label {
                width: 90px;
                font-size: 6px;
            }

            .top-bar h1 {
                font-size: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- BARRA SUPERIOR -->
    <div class="top-bar">
        <h1>🏇 DESAFÍO: GALOPE CON PROPÓSITO</h1>
        <div class="meta-info">META: <span id="metaDisplay">100</span> PTS</div>
    </div>

    <!-- CONTENEDOR DE CARRILES -->
    <div class="race-container" id="raceContainer">
        <div class="empty-race">
            <div class="big-horse">🐴</div>
            <p>Esperando participantes...<br>Abre el panel de admin para comenzar</p>
        </div>
    </div>

    <!-- OVERLAY DE GANADOR -->
    <div class="winner-overlay" id="winnerOverlay">
        <div class="winner-text">🏆 ¡GANADOR! 🏆</div>
        <div class="winner-name" id="winnerName"></div>
        <button class="winner-close" onclick="cerrarOverlay()">CONTINUAR ▶</button>
    </div>

    <!-- CONTENEDOR DE CONFETTI -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        // ──────────────────────────────────────────
        // ⚙️  Estado
        // ──────────────────────────────────────────
        let participantes = [];
        let puntajeMeta = 100;
        let puntajeIntermedio = 50;
        let winnersShown = new Set(); // evitar re-mostrar overlay

        // Colores vibrantes para los carriles
        const COLORES = [
            '#ff2975', '#00fff5', '#ffe66d', '#7fff00', '#a855f7',
            '#ff6b9d', '#4da6ff', '#ff9f43', '#2ed573', '#ffa502',
            '#e84393', '#74b9ff', '#fd79a8', '#55efc4', '#fdcb6e'
        ];

        // Emojis de caballos para variedad
        const HORSE_EMOJIS = ['🐴', '🏇', '🦄', '🐎'];

        // ──────────────────────────────────────────
        // 📡  SSE — Conexión en tiempo real
        // ──────────────────────────────────────────
        function conectarSSE() {
            const source = new EventSource('/api/stream');

            source.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    puntajeMeta = data.puntaje_meta || 100;
                    puntajeIntermedio = data.puntaje_intermedio || 50;
                    document.getElementById('metaDisplay').textContent = puntajeMeta;

                    const oldParticipantes = participantes;
                    participantes = (data.participantes || []).sort((a, b) => a.nombre.localeCompare(b.nombre));
                    renderCarrera(oldParticipantes);
                } catch (e) {
                    console.error('Error SSE:', e);
                }
            };

            source.onerror = () => {
                console.warn('SSE desconectado, reconectando en 3s...');
                source.close();
                setTimeout(conectarSSE, 3000);
            };
        }

        // ──────────────────────────────────────────
        // 🎨  Render de la carrera
        // ──────────────────────────────────────────
        function renderCarrera(oldData) {
            const container = document.getElementById('raceContainer');

            if (participantes.length === 0) {
                container.innerHTML = `
          <div class="empty-race">
            <div class="big-horse">🐴</div>
            <p>Esperando participantes...<br>Abre el panel de admin para comenzar</p>
          </div>`;
                return;
            }

            container.innerHTML = participantes.map((p, idx) => {
                const color = COLORES[idx % COLORES.length];
                const pct = Math.min(100, (p.puntaje / puntajeMeta) * 100);
                // Ancho de progreso: mínimo 36px, máximo = (100% - espacio de meta)
                const widthPct = 2 + (pct * 0.88); // escalar de 2% a 90%
                const isWinner = p.puntaje >= puntajeMeta;
                const horseEmoji = HORSE_EMOJIS[idx % HORSE_EMOJIS.length];

                const currentEmoji = p.emoji || horseEmoji;

                // Avatar: imagen o emoji
                const avatarContent = p.ruta_imagen
                    ? `<img src="${p.ruta_imagen}" alt="${p.nombre}">`
                    : currentEmoji;

                const halfPct = Math.min(100, (puntajeIntermedio / puntajeMeta) * 100);
                const halfWidthPct = 2 + (halfPct * 0.88);

                const retreatPct = Math.min(100, (7 / puntajeMeta) * 100);
                const retreatWidthPct = 2 + (retreatPct * 0.88);
                const starBadge = p.puntaje >= 7 ? '<span class="star-badge" title="Habilitado al Retiro">⭐</span>' : '';
                const discountBadge = p.puntaje >= puntajeIntermedio ? '<span class="discount-badge" title="Descuento en Polera">🏷️</span>' : '';

                return `
          <div class="lane" id="lane-${p.id}" style="z-index: ${100 - idx};">
            <div class="lane-label">
              ${p.nombre} ${starBadge}${discountBadge}
              <span class="lane-score">${p.puntaje} pts</span>
            </div>
            <div class="lane-track">
              <div class="lane-halfway" style="left: ${halfWidthPct}%;">
                ${idx === 0 ? `<div class="halfway-label">${puntajeIntermedio} pts (Dscto. % Polera)</div>` : ''}
              </div>
              <div class="lane-retreat" style="left: ${retreatWidthPct}%;">
                ${idx === 0 ? `<div class="retreat-label">7 pts (Retiro)</div>` : ''}
              </div>
              <div class="lane-finish">
                ${idx === 0 ? `<div class="finish-flag">🏁</div>` : ''}
              </div>
              <div class="lane-progress" style="width:${widthPct}%; background:${color}80;">
                <div class="horse">${avatarContent}</div>
              </div>
            </div>
          </div>
        `;
            }).join('');

            // Detectar nuevos ganadores
            participantes.forEach(p => {
                if (p.puntaje >= puntajeMeta && !winnersShown.has(p.id)) {
                    // Verificar si antes no era ganador
                    const oldP = (oldData || []).find(o => o.id === p.id);
                    if (!oldP || oldP.puntaje < puntajeMeta) {
                        winnersShown.add(p.id);
                        mostrarGanador(p.nombre);
                    }
                }
            });

            // Si hubo reset (nueva carrera), limpiar winners
            const allZero = participantes.every(p => p.puntaje === 0);
            if (allZero) {
                winnersShown.clear();
            }
        }

        // ──────────────────────────────────────────
        // 🏆  Animación de ganador
        // ──────────────────────────────────────────
        function mostrarGanador(nombre) {
            document.getElementById('winnerName').textContent = nombre;
            document.getElementById('winnerOverlay').classList.add('active');
            lanzarConfetti();
        }

        function cerrarOverlay() {
            document.getElementById('winnerOverlay').classList.remove('active');
            document.getElementById('confettiContainer').innerHTML = '';
        }

        // ──────────────────────────────────────────
        // 🎊  Confetti 8-bit
        // ──────────────────────────────────────────
        function lanzarConfetti() {
            const container = document.getElementById('confettiContainer');
            container.innerHTML = '';
            const colores = ['#ff2975', '#00fff5', '#ffe66d', '#7fff00', '#a855f7', '#ff6b9d', '#4da6ff', '#ff9f43'];

            for (let i = 0; i < 80; i++) {
                const pixel = document.createElement('div');
                pixel.className = 'confetti-pixel';
                const size = 6 + Math.random() * 8;
                pixel.style.width = size + 'px';
                pixel.style.height = size + 'px';
                pixel.style.background = colores[Math.floor(Math.random() * colores.length)];
                pixel.style.left = Math.random() * 100 + '%';
                pixel.style.top = -20 + 'px';
                pixel.style.animationDuration = (2 + Math.random() * 3) + 's';
                pixel.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(pixel);
            }

            // Segunda oleada
            setTimeout(() => {
                for (let i = 0; i < 50; i++) {
                    const pixel = document.createElement('div');
                    pixel.className = 'confetti-pixel';
                    const size = 4 + Math.random() * 10;
                    pixel.style.width = size + 'px';
                    pixel.style.height = size + 'px';
                    pixel.style.background = colores[Math.floor(Math.random() * colores.length)];
                    pixel.style.left = Math.random() * 100 + '%';
                    pixel.style.top = -20 + 'px';
                    pixel.style.animationDuration = (2.5 + Math.random() * 2.5) + 's';
                    pixel.style.animationDelay = Math.random() * 1.5 + 's';
                    container.appendChild(pixel);
                }
            }, 1500);
        }

        // ──────────────────────────────────────────
        // 🚀  Init
        // ──────────────────────────────────────────
        conectarSSE();
    </script>
</body>

</html>
