<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏇 Admin — Desafío: Galope con Propósito</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* ──────────────────────────────────────────
       ⚙️  VARIABLES — fáciles de modificar
       ────────────────────────────────────────── */
        :root {
            --bg-dark: #0f0e17;
            --bg-card: #1a1932;
            --bg-card-hover: #252347;
            --accent-cyan: #00fff5;
            --accent-magenta: #ff2975;
            --accent-yellow: #ffe66d;
            --accent-green: #7fff00;
            --accent-orange: #ff6600;
            --text-main: #e0e0ff;
            --text-dim: #8888aa;
            --border-glow: #00fff544;
            --font-pixel: 'Press Start 2P', monospace;
            --font-body: 'Segoe UI', system-ui, sans-serif;
            --radius: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, #1a1932 0%, #0f0e17 100%);
            border-bottom: 2px solid var(--accent-cyan);
            padding: 18px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: 0 4px 30px #00fff520;
        }

        .header h1 {
            font-family: var(--font-pixel);
            font-size: 14px;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px #00fff580;
            letter-spacing: 1px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ── BOTONES GLOBALES ── */
        .btn {
            font-family: var(--font-pixel);
            font-size: 9px;
            padding: 10px 16px;
            border: 2px solid;
            border-radius: var(--radius);
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-nueva {
            background: var(--accent-magenta);
            border-color: var(--accent-magenta);
            color: #fff;
            box-shadow: 0 0 15px #ff297540;
        }

        .btn-nueva:hover {
            box-shadow: 0 0 25px #ff297580;
        }

        .btn-cargar {
            background: transparent;
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: 0 0 10px #00fff520;
        }

        .btn-cargar:hover {
            background: #00fff510;
            box-shadow: 0 0 20px #00fff540;
        }

        .btn-proyector {
            background: transparent;
            border-color: var(--accent-yellow);
            color: var(--accent-yellow);
        }

        .btn-proyector:hover {
            background: #ffe66d15;
        }

        /* ── SKINS ── */
        .skin-selector {
            font-size: 18px;
            padding: 8px;
            background: var(--bg-card);
            border: 2px solid #333355;
            border-radius: var(--radius);
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .skin-selector:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px #00fff530;
        }
        
        .p-skin-select {
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #333355;
            border-radius: 4px;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            margin-bottom: 4px;
            padding: 2px;
        }

        /* ── FORMULARIO AGREGAR ── */
        .add-section {
            padding: 20px 30px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .add-section input {
            font-family: var(--font-body);
            font-size: 14px;
            padding: 10px 16px;
            background: var(--bg-card);
            border: 2px solid #333355;
            border-radius: var(--radius);
            color: var(--text-main);
            outline: none;
            width: 260px;
            transition: border-color 0.2s;
        }

        .add-section input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px #00fff530;
        }

        .add-section input::placeholder {
            color: var(--text-dim);
        }

        .btn-add {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: #111;
            box-shadow: 0 0 12px #7fff0040;
        }

        /* ── LISTA DE PARTICIPANTES ── */
        .participants-list {
            padding: 10px 30px 30px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .participant-card {
            background: var(--bg-card);
            border: 1px solid #2a2955;
            border-radius: var(--radius);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
            flex-wrap: wrap;
        }

        .participant-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-glow);
        }

        .participant-card.winner {
            border-color: var(--accent-yellow);
            box-shadow: 0 0 20px #ffe66d30;
            animation: winner-glow 1s infinite alternate;
        }

        @keyframes winner-glow {
            from {
                box-shadow: 0 0 10px #ffe66d20;
            }

            to {
                box-shadow: 0 0 30px #ffe66d50;
            }
        }

        .p-avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-pixel);
            font-size: 14px;
            color: #111;
            flex-shrink: 0;
            image-rendering: pixelated;
        }

        .p-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        .p-info {
            flex: 1;
            min-width: 120px;
        }

        .p-name {
            font-family: var(--font-pixel);
            font-size: 10px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .p-score {
            font-size: 13px;
            color: var(--text-dim);
        }

        .p-score strong {
            color: var(--accent-yellow);
            font-size: 15px;
        }

        .p-winner-badge {
            font-family: var(--font-pixel);
            font-size: 8px;
            color: var(--accent-yellow);
            animation: blink 0.6s infinite;
            margin-left: 6px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .p-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-pts {
            font-family: var(--font-pixel);
            font-size: 7px;
            padding: 7px 10px;
            border: 2px solid;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 80px;
            text-align: center;
        }

        .btn-pts:hover {
            transform: scale(1.05);
        }

        .btn-pts:active {
            transform: scale(0.97);
        }

        .btn-pts .pts-label {
            font-size: 6px;
            opacity: 0.8;
        }

        .btn-pts .pts-value {
            font-size: 9px;
        }

        /* Colores para cada categoría de botón */
        .btn-pts.cat-0 {
            background: #1e3a5f;
            border-color: #4da6ff;
            color: #4da6ff;
        }

        .btn-pts.cat-0:hover {
            background: #244a73;
            box-shadow: 0 0 12px #4da6ff40;
        }

        .btn-pts.cat-1 {
            background: #2d1e5f;
            border-color: #a855f7;
            color: #a855f7;
        }

        .btn-pts.cat-1:hover {
            background: #3a2873;
            box-shadow: 0 0 12px #a855f740;
        }

        .btn-pts.cat-2 {
            background: #5f3a1e;
            border-color: #ff9f43;
            color: #ff9f43;
        }

        .btn-pts.cat-2:hover {
            background: #734a28;
            box-shadow: 0 0 12px #ff9f4340;
        }

        .btn-pts.cat-3 {
            background: #1e5f3a;
            border-color: #2ed573;
            color: #2ed573;
        }

        .btn-pts.cat-3:hover {
            background: #287348;
            box-shadow: 0 0 12px #2ed57340;
        }

        .btn-pts.cat-4 {
            background: #5f1e3a;
            border-color: #ff6b9d;
            color: #ff6b9d;
        }

        .btn-pts.cat-4:hover {
            background: #73284a;
            box-shadow: 0 0 12px #ff6b9d40;
        }

        .btn-delete {
            background: transparent;
            border: 1px solid #44223a;
            color: #883355;
            font-size: 16px;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background: #ff297520;
            border-color: var(--accent-magenta);
            color: var(--accent-magenta);
        }

        /* ── TOAST NOTIFICATIONS ── */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            font-family: var(--font-pixel);
            font-size: 8px;
            padding: 12px 18px;
            border-radius: 6px;
            color: #fff;
            animation: toast-in 0.3s ease-out, toast-out 0.4s 2.2s ease-in forwards;
            max-width: 300px;
            box-shadow: 0 4px 20px #00000060;
        }

        .toast-success {
            background: #1a5f2a;
            border: 1px solid var(--accent-green);
        }

        .toast-info {
            background: #1a3260;
            border: 1px solid #4da6ff;
        }

        @keyframes toast-in {
            from {
                opacity: 0;
                transform: translateX(40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toast-out {
            to {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-family: var(--font-pixel);
            font-size: 10px;
            line-height: 1.8;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .header {
                padding: 14px 16px;
            }

            .header h1 {
                font-size: 11px;
            }

            .add-section {
                padding: 16px;
            }

            .add-section input {
                width: 100%;
            }

            .participants-list {
                padding: 10px 16px 20px;
            }

            .participant-card {
                padding: 12px;
            }

            .p-actions {
                width: 100%;
            }

            .btn-pts {
                flex: 1;
                min-width: 60px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>🏇 Panel de Control</h1>
        <div class="header-actions">
            <button class="btn btn-cargar" onclick="cargarSesion()">📂 Cargar Sesión</button>
            <button class="btn btn-nueva" onclick="nuevaCarrera()">🔄 Nueva Carrera</button>
            <button class="btn btn-proyector" onclick="window.open('/proyector','_blank')">📺 Abrir Proyector</button>
        </div>
    </div>

    <!-- AGREGAR PARTICIPANTE -->
    <div class="add-section">
        <select id="selectEmoji" class="skin-selector" title="Elige tu Avatar">
            <option value="🐴">🐴</option>
            <option value="🐎">🐎</option>
            <option value="🦄">🦄</option>
            <option value="🦓">🦓</option>
            <option value="🐪">🐪</option>
            <option value="🦙">🦙</option>
            <option value="🦒">🦒</option>
            <option value="🐅">🐅</option>
            <option value="🦖">🦖</option>
            <option value="🐕">🐕</option>
            <option value="🐆">🐆</option>
        </select>
        <input type="text" id="inputNombre" placeholder="Nombre del participante..."
            onkeydown="if(event.key==='Enter') agregarParticipante()">
        <button class="btn btn-add" onclick="agregarParticipante()">+ Agregar</button>
    </div>

    <!-- LISTA -->
    <div class="participants-list" id="listaParticipantes">
        <div class="empty-state">
            <div class="emoji">🐴</div>
            <p>Cargando participantes...</p>
        </div>
    </div>

    <!-- TOASTS -->
    <div class="toast-container" id="toasts"></div>

    <script>
        // ──────────────────────────────────────────
        // ⚙️  Estado local
        // ──────────────────────────────────────────
        let participantes = [];
        let categorias = [];
        let puntajeMeta = 100;

        // ──────────────────────────────────────────
        // 🔌  API helpers
        // ──────────────────────────────────────────
        async function api(url, opts = {}) {
            const res = await fetch(url, {
                headers: { 'Content-Type': 'application/json' },
                ...opts
            });
            return res.json();
        }

        // ──────────────────────────────────────────
        // 📥  Cargar config + datos
        // ──────────────────────────────────────────
        async function cargarConfig() {
            const cfg = await api('/api/config');
            categorias = cfg.categorias;
            puntajeMeta = cfg.puntaje_meta;
        }

        async function cargarSesion() {
            const data = await api('/api/participantes');
            participantes = (data || []).sort((a, b) => a.nombre.localeCompare(b.nombre));
            renderLista();
            toast('Sesión cargada', 'info');
        }

        async function nuevaCarrera() {
            if (!confirm('¿Reiniciar todos los puntajes a cero?')) return;
            await api('/api/sesion/nueva', { method: 'POST' });
            await cargarSesion();
            toast('¡Nueva carrera iniciada!', 'success');
        }

        // ──────────────────────────────────────────
        // ➕  Agregar participante
        // ──────────────────────────────────────────
        async function agregarParticipante() {
            const input = document.getElementById('inputNombre');
            const select = document.getElementById('selectEmoji');
            const nombre = input.value.trim();
            const emoji = select ? select.value : '🐴';
            if (!nombre) return;
            await api('/api/participantes', {
                method: 'POST',
                body: JSON.stringify({ nombre, emoji })
            });
            input.value = '';
            await cargarSesion();
            toast(`${nombre} se unió a la carrera`, 'success');
        }

        async function cambiarEmoji(id, nuevoEmoji) {
            await api(`/api/participantes/${id}/emoji`, {
                method: 'PUT',
                body: JSON.stringify({ emoji: nuevoEmoji })
            });
            await cargarSesion();
            toast(`Skin actualizada a ${nuevoEmoji}`, 'success');
        }

        // ──────────────────────────────────────────
        // 🎯  Asignar puntos
        // ──────────────────────────────────────────
        async function asignarPuntos(id, puntos, catNombre) {
            await api('/api/puntos', {
                method: 'POST',
                body: JSON.stringify({ id, puntos })
            });
            await cargarSesion();
            toast(`+${puntos} pts (${catNombre})`, 'success');
        }

        // ──────────────────────────────────────────
        // 🗑️  Eliminar participante
        // ──────────────────────────────────────────
        async function eliminarParticipante(id, nombre) {
            if (!confirm(`¿Eliminar a "${nombre}" de la carrera?`)) return;
            await api(`/api/participantes/${id}`, { method: 'DELETE' });
            await cargarSesion();
            toast(`${nombre} eliminado`, 'info');
        }

        // ──────────────────────────────────────────
        // 🎨  Render
        // ──────────────────────────────────────────
        const COLORES = ['#ff2975', '#00fff5', '#ffe66d', '#7fff00', '#a855f7', '#ff6b9d', '#4da6ff', '#ff9f43', '#2ed573', '#ffa502'];
        const EMOJIS_DISPONIBLES = ['🐴', '🐎', '🦄', '🦓', '🐪', '🦙', '🦒', '🐅', '🦖', '🐕', '🐆'];

        function renderLista() {
            const container = document.getElementById('listaParticipantes');

            if (participantes.length === 0) {
                container.innerHTML = `
          <div class="empty-state">
            <div class="emoji">🐴</div>
            <p>No hay participantes aún.<br>¡Agrega uno para comenzar!</p>
          </div>`;
                return;
            }

            container.innerHTML = participantes.map((p, idx) => {
                const color = COLORES[idx % COLORES.length];
                const isWinner = p.puntaje >= puntajeMeta;
                const pct = Math.min(100, Math.round((p.puntaje / puntajeMeta) * 100));

                const currentEmoji = p.emoji || '🐴';
                // Avatar: usa imagen si existe, si no, usa el emoji actual
                const avatar = p.ruta_imagen
                    ? `<img src="${p.ruta_imagen}" alt="${p.nombre}">`
                    : currentEmoji;

                const selectorHtml = !p.ruta_imagen ? `
                    <select class="p-skin-select" onchange="cambiarEmoji(${p.id}, this.value)" title="Cambiar Skin">
                        ${EMOJIS_DISPONIBLES.map(e => `<option value="${e}" ${e === currentEmoji ? 'selected' : ''}>${e}</option>`).join('')}
                    </select>
                ` : '';

                const botones = categorias.map((cat, ci) => `
          <button class="btn-pts cat-${ci}" onclick="asignarPuntos(${p.id}, ${cat.valor}, '${cat.nombre}')">
            <span class="pts-label">${cat.nombre}</span>
            <span class="pts-value">+${cat.valor}</span>
          </button>
        `).join('');

                return `
          <div class="participant-card ${isWinner ? 'winner' : ''}">
            <div class="p-avatar" style="background:${p.ruta_imagen ? 'transparent' : color}">${avatar}</div>
            <div class="p-info">
              <div class="p-name">
                ${selectorHtml} ${p.nombre}
                ${isWinner ? '<span class="p-winner-badge">🏆 ¡GANADOR!</span>' : ''}
              </div>
              <div class="p-score"><strong>${p.puntaje}</strong> / ${puntajeMeta} pts (${pct}%)</div>
            </div>
            <div class="p-actions">${botones}</div>
            <button class="btn-delete" onclick="eliminarParticipante(${p.id}, '${p.nombre.replace(/'/g, "\\'")}')" title="Eliminar">✕</button>
          </div>
        `;
            }).join('');
        }

        // ──────────────────────────────────────────
        // 🔔  Toast
        // ──────────────────────────────────────────
        function toast(msg, type = 'info') {
            const container = document.getElementById('toasts');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = msg;
            container.appendChild(el);
            setTimeout(() => el.remove(), 2800);
        }

        // ──────────────────────────────────────────
        // 🚀  Init
        // ──────────────────────────────────────────
        (async () => {
            await cargarConfig();
            await cargarSesion();
        })();
    </script>
</body>

</html>
